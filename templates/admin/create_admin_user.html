{% extends "admin/base_site.html" %}

{% block content %}
<div id="content-main">
    <h1>Quick Create Admin User</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="submit-row">
            <input type="submit" value="Create Admin User" class="default">
            <a href="/admin/auth/user/" class="button cancel-link">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
