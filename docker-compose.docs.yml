services:
  docs:
    image: altempo_core_service_local_docs
    container_name: altempo_core_service_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./altempo_core_service:/app/altempo_core_service:z
    ports:
      - '9000:9000'
    command: /start-docs
